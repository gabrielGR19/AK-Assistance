kind = "web"
previewPath = "/"
title = "AK-Assistance Landing Page"
version = "1.0.0"
id = "artifacts/ak-assistance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25223

[services.development]
run = "pnpm --filter @workspace/ak-assistance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ak-assistance", "run", "build" ]
publicDir = "artifacts/ak-assistance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25223"
BASE_PATH = "/"
