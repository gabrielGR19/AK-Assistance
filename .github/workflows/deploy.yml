name: Website deployen

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "!website/blog-agent/**"
      - "!website/node_modules/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Website auf Server übertragen
        run: |
          rsync -avz --delete \
            --exclude='blog-agent/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key" \
            website/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/
