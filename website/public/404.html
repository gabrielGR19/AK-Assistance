<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden — AK-Assistance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d2d3e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo { height: 56px; margin-bottom: 40px; }
    .code {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #e8622a;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }
    p {
      color: #a0b4c0;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 400px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 100px;
      background: #e8622a;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.btn:hover { background: #d4541e; }
  </style>
</head>
<body>
  <img src="/logo.png" alt="AK-Assistance Logo" class="logo" loading="lazy" />
  <div class="code">404</div>
  <h1>Diese Seite existiert nicht.</h1>
  <p>Die gesuchte Seite wurde nicht gefunden oder wurde verschoben.</p>
  <a href="/" class="btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Zurück zur Startseite
  </a>
</body>
</html>
